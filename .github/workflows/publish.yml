name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: |
          echo "=== .npmrc ==="
          cat ~/.npmrc 2>/dev/null || echo "(none)"
          echo "=== NODE_AUTH_TOKEN ==="
          echo "${NODE_AUTH_TOKEN:+SET}${NODE_AUTH_TOKEN:-UNSET}"
          echo "=== NPM_CONFIG_USERCONFIG ==="
          echo "${NPM_CONFIG_USERCONFIG:-UNSET}"

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm publish
